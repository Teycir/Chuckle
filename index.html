<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chuckle Browser Build</title>
  <style>
    :root {
      color-scheme: light;
      --bg-start: #f6fbff;
      --bg-end: #eaf2ff;
      --panel: #ffffff;
      --text: #1d2433;
      --muted: #5f6b84;
      --primary: #1762ff;
      --primary-hover: #0f4ccc;
      --border: #d7e1f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(140deg, var(--bg-start), var(--bg-end));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .panel {
      width: min(560px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 16px 36px rgba(15, 43, 93, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid var(--primary);
      color: var(--primary);
      transition: 0.2s ease;
    }

    .btn.primary {
      background: var(--primary);
      color: #fff;
    }

    .btn:hover {
      border-color: var(--primary-hover);
      color: var(--primary-hover);
    }

    .btn.primary:hover {
      background: var(--primary-hover);
      color: #fff;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #eff3fc;
      border-radius: 6px;
      padding: 2px 6px;
      color: #0c2457;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Chuckle Browser Distribution</h1>
    <p>
      This build can run directly in a regular browser tab. Open <code>popup.html</code> for settings and stats,
      or open <code>viewer.html</code> with query data to preview a meme.
    </p>
    <div class="actions">
      <a class="btn primary" href="./popup.html">Open Settings UI</a>
      <a class="btn" href="./viewer.html">Open Viewer</a>
    </div>
  </main>
</body>
</html>
